<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <title>Auction Archive — David Ambarzumjan</title>
  <meta name="description" content="A chronological archive of David Ambarzumjan's miniature original painting auctions and final results.">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="intro">
      <p class="eyebrow">Brushstrokes in Time</p>
      <h1>Auction Archive</h1>
      <p class="description">A chronological archive of miniature original paintings and their final auction results.</p>
      <p id="count" class="count" aria-live="polite"></p>
    </header>

    <section class="controls" aria-label="Archive filters">
      <label>Search<input id="search" type="search" placeholder="Title, year, bid or charity"></label>
      <label>Year<select id="year"><option value="all">All years</option></select></label>
      <button id="reset" type="button">Reset</button>
    </section>

    <section id="archive" class="archive" aria-live="polite"></section>
    <p id="empty" class="empty" hidden>No works match those filters.</p>
    <p id="load-error" class="empty" hidden>Archive data could not be loaded.</p>
  </main>

  <dialog id="viewer" class="viewer">
    <button class="close" type="button" aria-label="Close gallery">×</button>
    <button class="nav previous" type="button" aria-label="Previous image">‹</button>
    <figure>
      <img alt="">
      <figcaption class="viewer-caption"><p></p><span class="image-counter"></span></figcaption>
    </figure>
    <button class="nav next" type="button" aria-label="Next image">›</button>
  </dialog>

  <script src="assets/app.js" defer></script>
</body>
</html>
